name: Playwright Full-Stack E2E & API Tests

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # 1. BAĞIMLILIKLARIN YÜKLENMESİ
    - name: Backend Bağımlılıklarını Yükle
      working-directory: ./backend
      run: npm ci

    - name: Frontend Bağımlılıklarını Yükle
      working-directory: ./frontend
      run: npm ci

    - name: Root (Ana Dizin) Bağımlılıklarını Yükle
      run: npm install # Playwright ve dotenv için ana dizin kurulumu

    # 2. PLAYWRIGHT KURULUMU
    - name: Playwright Tarayıcılarını Yükle
      run: npx playwright install --with-deps

    # 3. TESTLERİN ÇALIŞTIRILMASI
    - name: Playwright Testlerini Çalıştır (E2E ve API)
      env:
        CI: "true"  
        # Backend Değişkenleri
        ATLAS_URI: ${{ secrets.ATLAS_URI }}
        MONGO_URI: ${{ secrets.ATLAS_URI }} 
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        BROWSERLESS_API_KEY: ${{ secrets.BROWSERLESS_API_KEY }}
        PORT: 8080
        NODE_ENV: development
        # Frontend & Test Değişkenleri
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}   
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      run: npx playwright test

    # 4. SLACK BİLDİRİMİ
    - name: Slack Bildirimi Gönder
      if: always()
      run: |
        JOB_STATUS="${{ job.status }}"
        
        RAW_TITLE="${{ github.event.pull_request.title || github.event.head_commit.message || github.ref_name }}"
        COMMIT_TITLE=$(echo "$RAW_TITLE" | head -n 1 | sed 's/"/\\"/g')

        FAILED_TESTS_MSG=""
        # 🔥 DÜZELTME: frontend/test-results.json yolu root olarak güncellendi
        if [ "$JOB_STATUS" != "success" ] && [ -f test-results.json ]; then
          FAILED_LIST=$(jq -r '.. | .specs? | arrays | .[] | select(.tests[].results[]?.status == "failed") | .title' test-results.json | head -n 3 | sed 's/"/\\"/g' | awk '{printf "• %s\\n", $0}')
          
          if [ -n "$FAILED_LIST" ]; then
            FAILED_TESTS_MSG="\n\n*🔴 Başarısız Testler:*\n${FAILED_LIST}"
          fi
        fi

        if [ "$JOB_STATUS" = "success" ]; then
          EMOJI="✅"
          TEXT_COLOR="#2eb886"
        else
          EMOJI="❌"
          TEXT_COLOR="#a30200"
        fi

        curl -X POST -H 'Content-type: application/json' \
        --data "{
          \"attachments\": [
            {
              \"color\": \"$TEXT_COLOR\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"$EMOJI Playwright Test Sonucu: $JOB_STATUS\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Yapılan İşlem:* \`$COMMIT_TITLE\`\n*Branch:* \`${{ github.ref_name }}\`\n*Tetikleyen:* ${{ github.actor }}${FAILED_TESTS_MSG}\"
                  }
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {
                      \"type\": \"button\",
                      \"text\": {
                        \"type\": \"plain_text\",
                        \"text\": \"Raporu İncele\"
                      },
                      \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                    }
                  ]
                }
              ]
            }
          ]
        }" \
        ${{ secrets.SLACK_WEBHOOK_URL }}

    # 5. RAPOR KAYDI
    - name: Test Raporlarını Yükle
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30