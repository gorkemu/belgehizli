name: Playwright Full-Stack E2E Tests

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # --- BACKEND KURULUMU VE ÇALIŞTIRILMASI ---
    - name: Backend Bağımlılıklarını Yükle
      working-directory: ./backend
      run: npm ci

    - name: Backend Sunucusunu Arka Planda Başlat
      working-directory: ./backend
      env:
        ATLAS_URI: ${{ secrets.ATLAS_URI }}
        MONGO_URI: ${{ secrets.ATLAS_URI }} 
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        BROWSERLESS_API_KEY: ${{ secrets.BROWSERLESS_API_KEY }}
        PORT: 8080
        NODE_ENV: development
      run: npm run start & 
      
    - name: Backend'in Hazır Olmasını Bekle
      run: sleep 5 

    - name: Frontend Bağımlılıklarını Yükle
      working-directory: ./frontend
      run: npm ci

    - name: Playwright Tarayıcılarını Yükle
      working-directory: ./frontend
      run: npx playwright install --with-deps

    - name: Playwright Testlerini Çalıştır
      working-directory: ./frontend
      env:
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      run: npx playwright test

    - name: Slack Bildirimi Gönder
      if: always()
      run: |
        JOB_STATUS="${{ job.status }}"
        
        # 1. Commit/PR Başlığını Al (Sadece ilk satırı alır ve JSON'ı bozmaması için tırnakları temizler)
        RAW_TITLE="${{ github.event.pull_request.title || github.event.head_commit.message || github.ref_name }}"
        COMMIT_TITLE=$(echo "$RAW_TITLE" | head -n 1 | sed 's/"/\\"/g')

        # 2. Başarısız Testleri Bul (Sadece testler patladıysa ve rapor oluştuysa çalışır)
        FAILED_TESTS_MSG=""
        if [ "$JOB_STATUS" != "success" ] && [ -f frontend/test-results.json ]; then
          # jq aracı ile JSON'un içine girip fail olan ilk 3 testin ismini çekiyoruz
          FAILED_LIST=$(jq -r '.. | .specs? | arrays | .[] | select(.tests[].results[]?.status == "failed") | .title' frontend/test-results.json | head -n 3 | sed 's/"/\\"/g' | awk '{printf "• %s\\n", $0}')
          
          # Eğer başarısız test bulduysa mesaja ekle
          if [ -n "$FAILED_LIST" ]; then
            FAILED_TESTS_MSG="\n\n*🔴 Başarısız Testler:*\n${FAILED_LIST}"
          fi
        fi

        # 3. Renk ve İkon Ayarı
        if [ "$JOB_STATUS" = "success" ]; then
          EMOJI="✅"
          TEXT_COLOR="#2eb886"
        else
          EMOJI="❌"
          TEXT_COLOR="#a30200"
        fi

        # 4. JSON Payload'unu Oluştur ve Slack'e Gönder (Tıklanabilir şık buton ile)
        curl -X POST -H 'Content-type: application/json' \
        --data "{
          \"attachments\": [
            {
              \"color\": \"$TEXT_COLOR\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"$EMOJI Playwright Test Sonucu: $JOB_STATUS\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Yapılan İşlem:* \`$COMMIT_TITLE\`\n*Branch:* \`${{ github.ref_name }}\`\n*Tetikleyen:* ${{ github.actor }}${FAILED_TESTS_MSG}\"
                  }
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {
                      \"type\": \"button\",
                      \"text\": {
                        \"type\": \"plain_text\",
                        \"text\": \"Raporu İncele\"
                      },
                      \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                    }
                  ]
                }
              ]
            }
          ]
        }" \
        ${{ secrets.SLACK_WEBHOOK_URL }}

    # --- HATA DURUMUNDA RAPORLARI KAYDET ---
    - name: Test Raporlarını Yükle
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30