name: Playwright Full-Stack E2E Tests

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # --- BACKEND KURULUMU VE ÇALIŞTIRILMASI ---
    - name: Backend Bağımlılıklarını Yükle
      working-directory: ./backend
      run: npm ci

    - name: Backend Sunucusunu Arka Planda Başlat
      working-directory: ./backend
      # Ortam değişkenlerini GitHub Secrets'tan alıyoruz
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        PORT: 5000
      # Komutun sonundaki '&' işareti sunucunun arka planda çalışmasını sağlar
      run: npm run start & 
      
    - name: Backend'in Hazır Olmasını Bekle (Opsiyonel Güvenlik)
      run: sleep 5 

    # --- FRONTEND VE PLAYWRIGHT KURULUMU ---
    - name: Frontend Bağımlılıklarını Yükle
      working-directory: ./frontend
      run: npm ci

    - name: Playwright Tarayıcılarını Yükle
      working-directory: ./frontend
      run: npx playwright install --with-deps

    - name: Playwright Testlerini Çalıştır
      working-directory: ./frontend
      # Frontend testleri çalışırken webServer (playwright.config.js) frontend'i ayağa kaldıracak
      run: npx playwright test

    # --- HATA DURUMUNDA RAPORLARI KAYDET ---
    - name: Test Raporlarını Yükle
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30