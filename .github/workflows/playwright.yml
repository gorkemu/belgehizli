name: Playwright Full-Stack E2E Tests

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # --- BACKEND KURULUMU VE ÇALIŞTIRILMASI ---
    - name: Backend Bağımlılıklarını Yükle
      working-directory: ./backend
      run: npm ci

    - name: Backend Sunucusunu Arka Planda Başlat
      working-directory: ./backend
      env:
        ATLAS_URI: ${{ secrets.ATLAS_URI }}
        MONGO_URI: ${{ secrets.ATLAS_URI }} 
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        BROWSERLESS_API_KEY: ${{ secrets.BROWSERLESS_API_KEY }}
        PORT: 8080
        NODE_ENV: development
      run: npm run start & 
      
    - name: Backend'in Hazır Olmasını Bekle
      run: sleep 5 

    - name: Frontend Bağımlılıklarını Yükle
      working-directory: ./frontend
      run: npm ci

    - name: Playwright Tarayıcılarını Yükle
      working-directory: ./frontend
      run: npx playwright install --with-deps

    - name: Playwright Testlerini Çalıştır
      working-directory: ./frontend
      env:
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      run: npx playwright test

    # --- HATA DURUMUNDA RAPORLARI KAYDET ---
    - name: Test Raporlarını Yükle
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30