name: Playwright E2E Tests

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: 22 
        cache: 'npm'

    - name: Bağımlılıkları Yükle (npm install)
      run: npm ci

    - name: Playwright Tarayıcılarını Yükle
      run: npx playwright install --with-deps

    - name: Playwright Testlerini Çalıştır
      run: npx playwright test

    - name: Test Raporlarını Kaydet (Eğer Hata Olursa İndirip İncelemek İçin)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30